<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Land Monitor{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f1ea;
            --surface: #fffdfa;
            --surface-2: #f8f4ec;
            --border: #d7cfc1;
            --text: #27211b;
            --muted: #72675a;
            --accent: #275d4d;
            --accent-soft: #e4f1ec;
            --danger-soft: #f4e2de;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #efe8dc 0%, var(--bg) 100%);
            color: var(--text);
        }
        a { color: var(--accent); }
        .topbar {
            border-bottom: 1px solid var(--border);
            background: rgba(255, 253, 250, 0.92);
            backdrop-filter: blur(8px);
        }
        .topbar__inner,
        .page {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
        }
        .topbar__inner {
            padding: 18px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            margin: 0;
            font-size: 1.35rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .brand a {
            color: inherit;
            text-decoration: none;
        }
        .page {
            padding: 28px 0 40px;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(39, 33, 27, 0.06);
        }
        .panel + .panel {
            margin-top: 20px;
        }
        .panel__body {
            padding: 20px;
        }
        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        .message {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .message.success {
            background: var(--accent-soft);
            border-color: #bbd6cb;
        }
        .message.info {
            background: #eef4f8;
            border-color: #c8d7e1;
        }
        .message.error {
            background: var(--danger-soft);
            border-color: #e2c0b5;
        }
        .muted {
            color: var(--muted);
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            font-size: 0.92rem;
        }
        .badge--accent {
            background: var(--accent-soft);
            border-color: #bbd6cb;
        }
        .badge--warn {
            background: var(--danger-soft);
            border-color: #e2c0b5;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fffdfa;
            text-decoration: none;
            cursor: pointer;
        }
        .button--ghost {
            background: transparent;
            color: var(--accent);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #ece4d8;
            text-align: left;
            vertical-align: top;
        }
        th {
            font-size: 0.82rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid--2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            text-decoration: none;
            color: var(--text);
        }
        .tab.is-active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fffdfa;
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 12px;
        }
        .field {
            display: grid;
            gap: 6px;
        }
        .inline-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .inline-form {
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin: 0;
        }
        .inline-form button,
        .inline-form select {
            min-height: 32px;
            font-size: 0.88rem;
        }
        .inline-form button {
            padding: 0 10px;
        }
        .inline-form select {
            min-width: 132px;
        }
        .actions-cell {
            min-width: 280px;
        }
        label {
            font-size: 0.85rem;
            color: var(--muted);
        }
        input, select {
            width: 100%;
            min-height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
        }
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .empty {
            padding: 28px;
            text-align: center;
            color: var(--muted);
        }
        .kv {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 10px 16px;
        }
        .kv dt {
            color: var(--muted);
        }
        .kv dd {
            margin: 0;
        }
        @media (max-width: 1024px) {
            .filters {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .grid--2,
            .kv {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .page, .topbar__inner {
                width: min(100% - 20px, 1280px);
            }
            .filters {
                grid-template-columns: 1fr;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead {
                display: none;
            }
            tbody tr {
                padding: 12px 0;
                border-bottom: 1px solid #ece4d8;
            }
            tbody td {
                border: 0;
                padding: 6px 0;
            }
            tbody td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.8rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.04em;
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar__inner">
            <h1 class="brand"><a href="{% url 'lots:list' %}">Land Monitor</a></h1>
            <span class="muted">Лоты и пользовательский статус</span>
        </div>
    </header>
    <main class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
