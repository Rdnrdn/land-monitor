<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Land Monitor{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f4f6;
            --bg-accent: #e8edf2;
            --surface: rgba(255, 255, 255, 0.94);
            --surface-strong: #ffffff;
            --surface-muted: #f8fafc;
            --border: #d7dde6;
            --border-strong: #c7d1dc;
            --text: #17202b;
            --muted: #5f6c7c;
            --accent: #1f5f54;
            --accent-strong: #18463e;
            --accent-soft: #e3f1ed;
            --danger-soft: #f9e7e5;
            --warning-soft: #fff4d8;
            --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(31, 95, 84, 0.09), transparent 32%),
                linear-gradient(180deg, var(--bg-accent) 0%, var(--bg) 100%);
            color: var(--text);
        }
        a {
            color: var(--accent);
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }
        .topbar {
            border-bottom: 1px solid var(--border);
            background: rgba(243, 244, 246, 0.84);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .topbar__inner,
        .page {
            width: min(1360px, calc(100% - 32px));
            margin: 0 auto;
        }
        .topbar__inner {
            padding: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            font-weight: 700;
        }
        .brand a {
            color: inherit;
            text-decoration: none;
        }
        .topbar__caption {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .page {
            padding: 28px 0 44px;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }
        .panel + .panel {
            margin-top: 20px;
        }
        .panel__body {
            padding: 22px;
        }
        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        .message {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .message.success {
            background: var(--accent-soft);
            border-color: #bbd6cb;
        }
        .message.info {
            background: #eef4f8;
            border-color: #c8d7e1;
        }
        .message.error {
            background: var(--danger-soft);
            border-color: #e2c0b5;
        }
        .muted {
            color: var(--muted);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            font-size: 0.82rem;
            font-weight: 600;
        }
        .badge--accent {
            background: var(--accent-soft);
            border-color: #b9d6cf;
        }
        .badge--warn {
            background: var(--warning-soft);
            border-color: #e5d29a;
        }
        .badge--danger {
            background: var(--danger-soft);
            border-color: #e7c4bc;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #f9fcfb;
            text-decoration: none;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        .button--ghost {
            background: rgba(255, 255, 255, 0.7);
            color: var(--accent);
            border-color: var(--border-strong);
        }
        .button--soft {
            background: var(--surface-muted);
            border-color: var(--border-strong);
            color: var(--text);
        }
        .button:hover,
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(31, 95, 84, 0.12);
        }
        .button:focus-visible,
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible {
            outline: 2px solid rgba(31, 95, 84, 0.32);
            outline-offset: 2px;
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid--2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 600;
        }
        .tab.is-active {
            background: var(--accent);
            border-color: var(--accent);
            color: #f9fcfb;
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 12px;
        }
        .field {
            display: grid;
            gap: 6px;
        }
        .field--compact label {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
        }
        .inline-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .inline-form {
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin: 0;
        }
        .inline-form button,
        .inline-form select {
            min-height: 32px;
            font-size: 0.88rem;
        }
        .inline-form button {
            padding: 0 10px;
        }
        .inline-form select {
            min-width: 132px;
        }
        .actions-cell {
            min-width: 280px;
        }
        label {
            font-size: 0.85rem;
            color: var(--muted);
        }
        input, select {
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.88);
            color: var(--text);
            font: inherit;
        }
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .pagination__pages {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pagination__link,
        .pagination__ellipsis {
            min-width: 40px;
            min-height: 40px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.74);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
        }
        .pagination__link.is-current {
            background: var(--accent);
            border-color: var(--accent);
            color: #f9fcfb;
        }
        .pagination__ellipsis {
            color: var(--muted);
        }
        .empty {
            padding: 36px 24px;
            text-align: center;
            color: var(--muted);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(248, 250, 252, 0.95));
            border: 1px dashed var(--border-strong);
            border-radius: 18px;
        }
        .kv {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 10px 16px;
        }
        .kv dt {
            color: var(--muted);
        }
        .kv dd {
            margin: 0;
        }
        .stack {
            display: grid;
            gap: 20px;
        }
        .section-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .section-title {
            margin: 0;
            font-size: 1.5rem;
            line-height: 1.15;
        }
        .section-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 70ch;
        }
        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .metric {
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.88));
        }
        .metric__label {
            color: var(--muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric__value {
            margin-top: 8px;
            font-size: 1.55rem;
            font-weight: 700;
        }
        .metric__hint {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.92rem;
        }
        .lot-grid {
            display: grid;
            gap: 16px;
        }
        .lot-card {
            display: grid;
            gap: 18px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.92));
        }
        .lot-card__header,
        .lot-card__footer {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .lot-card__title {
            margin: 8px 0 0;
            font-size: 1.08rem;
            line-height: 1.35;
        }
        .lot-card__title a {
            color: inherit;
            text-decoration: none;
        }
        .lot-card__title a:hover {
            color: var(--accent);
        }
        .lot-card__subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }
        .lot-card__meta {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .meta-tile {
            min-width: 0;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(248, 250, 252, 0.88);
        }
        .meta-tile__label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .meta-tile__value {
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }
        .meta-tile__value--price {
            font-size: 1.22rem;
        }
        .lot-card__details {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .detail-chip {
            min-width: 0;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.72);
        }
        .detail-chip__label {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .detail-chip__value {
            display: block;
            margin-top: 6px;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--border);
            background: var(--surface-muted);
        }
        .status-pill--active {
            background: var(--accent-soft);
            border-color: #b9d6cf;
            color: var(--accent-strong);
        }
        .status-pill--inactive {
            background: var(--danger-soft);
            border-color: #e7c4bc;
            color: #8b3c30;
        }
        .status-pill--neutral {
            color: var(--muted);
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .toolbar__meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters__footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .filters__hint {
            font-size: 0.92rem;
            color: var(--muted);
        }
        @media (max-width: 1024px) {
            .filters {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .hero-metrics,
            .lot-card__meta,
            .lot-card__details {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .grid--2,
            .kv {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .page, .topbar__inner {
                width: min(100% - 20px, 1280px);
            }
            .topbar__inner,
            .section-header,
            .lot-card__header,
            .lot-card__footer,
            .toolbar,
            .filters__footer,
            .pagination {
                flex-direction: column;
                align-items: stretch;
            }
            .filters {
                grid-template-columns: 1fr;
            }
            .hero-metrics,
            .lot-card__meta,
            .lot-card__details {
                grid-template-columns: 1fr;
            }
            .panel__body,
            .lot-card {
                padding: 18px;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="topbar__inner">
            <h1 class="brand"><a href="{% url 'lots:list' %}">Land Monitor</a></h1>
            <span class="topbar__caption">Лоты и пользовательский статус</span>
        </div>
    </header>
    <main class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
